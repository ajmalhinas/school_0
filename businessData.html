<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Field Check-In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* High-Contrast Sunlight Optimized Theme */
  :root {
    --blue: #0052CC;      /* Darker blue for readable contrast */
    --green: #1A5C34;     /* Deep green text compliance */
    --red: #D32F2F;       /* Visible alert red */
    --orange: #E65100;
    --bg: #FFFFFF;        /* Pure white eliminates matte reflection wash out */
    --card: #FFFFFF;
    --label: #333333;     /* Darkened for strong contrast */
    --text: #000000;      /* Absolute pitch black text */
    --border: #000000;    /* Solid black borders instead of soft grays */
    --radius-card: 12px;
    --radius-btn: 12px;
  }

  html, body {
    height: 100%; width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .page {
    min-height: 100vh;
    padding: 0 0 40px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Top bar */
  .topbar {
    background: #FFFFFF;
    padding: 52px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--border);
  }
  .topbar-title { font-size: 18px; font-weight: 700; }
  
  /* Clickable GPS Badge Button */
  .gps-badge {
    font-size: 13px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 20px;
    background: #EEEEEE;
    border: 2px solid var(--border);
    color: var(--text);
    display: flex; align-items: center; gap: 4px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .gps-badge:active { background: #CCCCCC; }
  .gps-badge.locked { background: #D4EDDA; color: #1A5C34; }
  .gps-badge.error  { background: #FFE5E5; color: #A32D2D; }

  .scroll-body {
    flex: 1;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-header {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
    padding-left: 4px;
  }

  .card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius-card);
    overflow: hidden;
  }

  .field-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 2px solid var(--border);
    gap: 12px;
  }
  .field-row:last-child { border-bottom: none; }

  .field-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .field-icon.shop  { background: #E3F0FF; }
  .field-icon.phone { background: #E3FFE8; }
  .field-icon.loc   { background: #FFF3E3; }

  .field-body { flex: 1; min-width: 0; }
  .field-label { font-size: 13px; font-weight: 700; color: var(--label); margin-bottom: 4px; }
  .field-input {
    width: 100%; border: none; outline: none;
    font-size: 17px; font-weight: 600; color: var(--text);
    background: transparent;
    font-family: inherit;
    padding: 4px 0;
  }
  .field-input::placeholder { color: #666666; font-weight: 400; }
  textarea.field-input { resize: none; line-height: 1.4; }

  /* Scan component */
  .scan-strip {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius-card);
    overflow: hidden;
  }

  .scan-hero {
    display: flex;
    align-items: center;
    padding: 16px;
    gap: 14px;
    cursor: pointer;
    background: #F0F4FF;
  }
  .scan-hero:active { background: #D0E0FF; }

  .scan-icon-wrap {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--blue);
    border: 1px solid #000;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .scan-text-wrap { flex: 1; }
  .scan-title { font-size: 16px; font-weight: 700; color: var(--blue); }
  .scan-sub   { font-size: 13px; color: #333333; font-weight: 500; margin-top: 2px; }
  .scan-arrow { color: #000000; font-size: 22px; font-weight: 700; }

  .thumb-row {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-top: 2px solid var(--border);
    background: #FAFFAF;
  }
  .thumb-row.visible { display: flex; }

  .thumb-img {
    width: 56px; height: 56px;
    object-fit: cover;
    border-radius: 8px;
    border: 2px solid var(--border);
    flex-shrink: 0;
  }
  .thumb-meta { flex: 1; min-width: 0; }
  .thumb-status { font-size: 14px; font-weight: 700; }
  .thumb-status.ok  { color: var(--green); }
  .thumb-status.err { color: var(--red); }
  .thumb-hint { font-size: 12px; color: #000000; margin-top: 2px; }

  .btn-rescan {
    font-size: 14px; color: var(--blue); font-weight: 700;
    background: #FFFFFF; border: 2px solid var(--blue); padding: 6px 12px;
    border-radius: 6px; cursor: pointer; white-space: nowrap;
  }

  .scan-loader {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-top: 2px solid var(--border);
    background: #FFF9C4;
  }
  .scan-loader.active { display: flex; }

  .spinner {
    width: 24px; height: 24px;
    border: 3px solid #000000;
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text { font-size: 14px; font-weight: 700; color: #000000; }

  /* Dictation interface */
  .voice-row {
    display: flex;
    flex-direction: column;
    padding: 14px 16px;
    gap: 12px;
  }
  .btn-voice {
    align-self: flex-start;
    background: #E0E0E0;
    color: #000000;
    border: 2px solid #000000;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    padding: 8px 16px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-voice.listening { background: var(--orange); color: #FFF; }

  /* Submit Action */
  .btn-submit {
    background: var(--blue);
    color: #FFFFFF;
    border: 2px solid #000000;
    border-radius: var(--radius-btn);
    padding: 18px;
    font-size: 18px;
    font-weight: 700;
    width: 100%;
    cursor: pointer;
    box-shadow: 0 4px 0 #000000;
  }
  .btn-submit:active { transform: translateY(2px); box-shadow: 0 2px 0 #000000; }
  .btn-submit.saved { background: var(--green); color: #FFF; }

  /* Alert Toasts */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #000000;
    color: #FFFFFF;
    padding: 14px 24px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
    transition: transform 0.25s ease, opacity 0.2s;
    opacity: 0;
    z-index: 999;
    pointer-events: none;
    border: 2px solid #FFFFFF;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  input[type="file"] { display: none; }
</style>
</head>
<body>

<div class="page">
  <div class="topbar">
    <span class="topbar-title">Field Check-In</span>
    <button class="gps-badge" id="gpsBadge" onclick="requestLocation()">📍 Locating…</button>
  </div>

  <div class="scroll-body">
    <div>
      <div class="section-header">Auto-fill from photo</div>
      <div class="scan-strip">
        <div class="scan-hero" onclick="document.getElementById('cameraInput').click()">
          <div class="scan-icon-wrap">📷</div>
          <div class="scan-text-wrap">
            <div class="scan-title">Scan shop sign or card</div>
            <div class="scan-sub">Extracts name and phone automatically</div>
          </div>
          <span class="scan-arrow">›</span>
        </div>

        <div class="scan-loader" id="scanLoader">
          <div class="spinner"></div>
          <span class="loader-text" id="loaderText">Reading image…</span>
        </div>

        <div class="thumb-row" id="thumbRow">
          <img class="thumb-img" id="thumbImg" alt="Scanned">
          <div class="thumb-meta">
            <div class="thumb-status" id="thumbStatus"></div>
            <div class="thumb-hint" id="thumbHint"></div>
          </div>
          <button class="btn-rescan" onclick="document.getElementById('cameraInput').click()">Rescan</button>
        </div>
      </div>
    </div>

    <div>
      <div class="section-header">Shop details</div>
      <div class="card">
        <div class="field-row">
          <div class="field-icon shop">🏪</div>
          <div class="field-body">
            <div class="field-label">Shop name</div>
            <input class="field-input" id="bizName" type="text" placeholder="e.g. Hasini Stores" autocomplete="off">
          </div>
        </div>
        <div class="field-row">
          <div class="field-icon phone">📞</div>
          <div class="field-body">
            <div class="field-label">Phone</div>
            <input class="field-input" id="phone" type="tel" placeholder="e.g. 077 123 4567" autocomplete="off">
          </div>
        </div>
        <div class="field-row">
          <div class="field-icon loc">📍</div>
          <div class="field-body">
            <div class="field-label">GPS coordinates (Tap badge to refresh)</div>
            <input class="field-input" id="gpsDisplay" type="text" placeholder="Auto-detecting..." readonly>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-header">Visit remarks</div>
      <div class="card">
        <div class="voice-row">
          <div class="field-body">
            <div class="field-label">Notes</div>
            <textarea class="field-input" id="remarks" rows="3" placeholder="Type notes or tap Dictate…"></textarea>
          </div>
          <button class="btn-voice" id="voiceBtn" onclick="toggleVoice()">🎤 Dictate</button>
        </div>
      </div>
    </div>

    <div>
      <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">Save entry</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="processImage(event)">

<form id="hiddenForm" style="display:none">
  <input id="gpsCoords">
</form>

<script>
// GPS Routine
function requestLocation() {
  const badge = document.getElementById('gpsBadge');
  badge.textContent = '📍 Updating...';
  badge.className = 'gps-badge';

  if (!navigator.geolocation) {
    badge.textContent = '📍 Unavailable';
    badge.classList.add('error');
    return;
  }

  navigator.geolocation.getCurrentPosition(p => {
    const lat = p.coords.latitude.toFixed(5);
    const lng = p.coords.longitude.toFixed(5);
    document.getElementById('gpsCoords').value = `${lat}, ${lng}`;
    document.getElementById('gpsDisplay').value  = `${lat}, ${lng}`;
    badge.innerHTML = '📍 GPS locked';
    badge.className = 'gps-badge locked';
    showToast('Location updated!');
  }, () => {
    badge.textContent = '📍 GPS error';
    badge.className = 'gps-badge error';
    showToast('Failed to acquire coordinates');
  }, { enableHighAccuracy: true, timeout: 12000 });
}

window.addEventListener('DOMContentLoaded', requestLocation);

// FIX: Updated OCR implementation handling your validation parameters correctly 
async function processImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  const objUrl = URL.createObjectURL(file);
  document.getElementById('thumbImg').src = objUrl;

  document.getElementById('thumbRow').classList.remove('visible');
  document.getElementById('scanLoader').classList.add('active');
  document.getElementById('loaderText').textContent = 'Processing image details…';

  try {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('language', 'eng');
    formData.append('isOverlayRequired', 'false');
    formData.append('detectOrientation', 'true');
    formData.append('scale', 'true');
    formData.append('OCREngine', '2'); 

    const res = await fetch('https://api.ocr.space/parse/image', {
      method: 'POST',
      headers: { 'apikey': 'K87267227288957' }, // Production API Key
      body: formData
    });

    if (!res.ok) throw new Error('Network error during analysis');
    const data = await res.json();

    if (data.IsErroredOnProcessing || !data.ParsedResults) {
      throw new Error(data.ErrorMessage || data.ErrorDetails || 'Image text analysis failed');
    }

    const text = data.ParsedResults.map(r => r.ParsedText).join('\n');
    
    if(!text || text.trim() === "") {
       throw new Error("No readable text found inside image");
    }

    parseText(text);

    document.getElementById('thumbStatus').textContent = '✓ Data Extracted';
    document.getElementById('thumbStatus').className = 'thumb-status ok';
    document.getElementById('thumbHint').textContent  = 'Please cross-verify form data.';

  } catch (err) {
    console.error('OCR error processing: ', err);
    document.getElementById('thumbStatus').textContent = 'Analysis Failed';
    document.getElementById('thumbStatus').className = 'thumb-status err';
    document.getElementById('thumbHint').textContent  = err.message;
  } finally {
    document.getElementById('scanLoader').classList.remove('active');
    document.getElementById('thumbRow').classList.add('visible');
    event.target.value = '';
  }
}

function parseText(text) {
  // Phone processing regex 
  const phoneRx = /(?:\+?\d{1,3}[-.\s]?)?\(?\d{2,4}\)?[-.\s]?\d{3,4}[-.\s]?\d{3,4}/g;
  const phones = text.match(phoneRx);
  if (phones && phones.length > 0) {
    document.getElementById('phone').value = phones[0].trim();
  }

  // Text line clean up for business validation
  const lines = text.split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 2 && !/^\d+$/.test(l) && !/^[+\d\s\-()]+$/.test(l));

  if (lines.length > 0) {
    document.getElementById('bizName').value = lines[0];
  }
}

// Voice Recognition Routine
let recognition = null;
let listening = false;

function toggleVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Speech profile unsupported in this browser'); return; }

  if (listening) {
    recognition && recognition.stop();
    return;
  }

  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    listening = true;
    const btn = document.getElementById('voiceBtn');
    btn.textContent = '⏹ Stop';
    btn.classList.add('listening');
  };
  recognition.onresult = e => {
    const t = e.results[0][0].transcript;
    const field = document.getElementById('remarks');
    field.value = (field.value ? field.value + ' ' : '') + t;
  };
  recognition.onerror = () => stopListening();
  recognition.onend   = () => stopListening();
  recognition.start();
}

function stopListening() {
  listening = false;
  const btn = document.getElementById('voiceBtn');
  btn.innerHTML = '🎤 Dictate';
  btn.classList.remove('listening');
}

// Form Submit Lifecycle
function handleSubmit() {
  const name = document.getElementById('bizName').value.trim();
  if (!name) {
    document.getElementById('bizName').focus();
    showToast('Shop Name field is required.');
    return;
  }

  const entry = {
    shop: name,
    phone: document.getElementById('phone').value.trim(),
    gps: document.getElementById('gpsCoords').value,
    remarks: document.getElementById('remarks').value.trim(),
    timestamp: new Date().toISOString()
  };

  console.log('Entry saved:', entry);

  const btn = document.getElementById('submitBtn');
  btn.textContent = '✓ Saved Successfully';
  btn.classList.add('saved');
  showToast('Form data cached.');

  setTimeout(() => {
    btn.textContent = 'Save entry';
    btn.classList.remove('saved');
    
    document.getElementById('bizName').value  = '';
    document.getElementById('phone').value    = '';
    document.getElementById('remarks').value  = '';
    document.getElementById('thumbRow').classList.remove('visible');
    document.getElementById('thumbImg').src   = '';
  }, 2000);
}

function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}
</script>
</body>
</html>
